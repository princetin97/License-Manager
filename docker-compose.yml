services:
  license-manager:
    build: .
    container_name: license-manager
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - TZ=Asia/Ho_Chi_Minh
      - DATABASE_URL=/app/data/license_manager.db
    volumes:
      - license_data:/app/data
    restart: always

volumes:
  license_data:
    driver: local
